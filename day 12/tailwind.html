<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Tailwind Flex Layout</title>
		<script src="https://cdn.tailwindcss.com"></script>
	</head>
	<body class="min-h-screen bg-gray-100 text-gray-900">
		<header class="bg-white shadow">
			<div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
				<h1 class="text-lg font-semibold">My App</h1>
				<nav class="hidden sm:flex gap-4">
					<a href="#" class="text-sm text-gray-600 hover:text-gray-900">Home</a>
					<a href="#" class="text-sm text-gray-600 hover:text-gray-900">Docs</a>
					<a href="#" class="text-sm text-gray-600 hover:text-gray-900">About</a>
				</nav>
				<div class="sm:hidden">
					<button class="p-2 rounded bg-gray-200">Menu</button>
				</div>
			</div>
		</header>

		<main class="max-w-6xl mx-auto px-4 py-6 flex gap-6 flex-col md:flex-row">
			<aside class="w-full md:w-1/4 bg-white rounded-lg p-4 shadow-sm">
				<h2 class="font-medium mb-3">Sidebar</h2>
				<ul class="space-y-2 text-sm text-gray-700">
					<li><a href="#" class="block p-2 rounded hover:bg-gray-50">Overview</a></li>
					<li><a href="#" class="block p-2 rounded hover:bg-gray-50">Reports</a></li>
					<li><a href="#" class="block p-2 rounded hover:bg-gray-50">Analytics</a></li>
					<li><a href="#" class="block p-2 rounded hover:bg-gray-50">Settings</a></li>
				</ul>
			</aside>

			<section class="flex-1">
				<div class="bg-white rounded-lg p-4 shadow-sm mb-6">
					<div class="flex items-center justify-between">
						<h2 class="text-xl font-semibold">Dashboard</h2>
						<div class="flex items-center gap-3">
							<input type="search" placeholder="Search" class="border rounded px-3 py-1 text-sm" />
							<button class="bg-blue-600 text-white px-3 py-1 rounded">Create</button>
						</div>
					</div>
				</div>

				<div class="flex flex-wrap gap-6">
					<div class="flex-1 min-w-[220px] bg-white rounded-lg p-4 shadow-sm">
						<h3 class="text-lg font-medium">Card A</h3>
						<p class="text-sm text-gray-600 mt-2">Uses flex and responsive sizing.</p>
					</div>

					<div class="flex-1 min-w-[220px] bg-white rounded-lg p-4 shadow-sm">
						<h3 class="text-lg font-medium">Card B</h3>
						<p class="text-sm text-gray-600 mt-2">Auto-growing item with equal spacing.</p>
					</div>

					<div class="w-full md:w-auto min-w-[220px] bg-white rounded-lg p-4 shadow-sm">
						<h3 class="text-lg font-medium">Activity</h3>
						<p class="text-sm text-gray-600 mt-2">Wraps to next line on small screens.</p>
					</div>
				</div>
			</section>
		</main>

		<footer class="mt-8">
			<div class="max-w-6xl mx-auto px-4 py-4 text-sm text-gray-600">
				© 2026 My App — built with Tailwind CSS
			</div>
		</footer>
	</body>
</html>
